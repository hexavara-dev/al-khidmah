name: Deploy Laravel Inertia React Application

on:
  push:
    branches:
      - main
  workflow_dispatch: # Bisa trigger manual

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Update ke v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json
        coverage: none

    - name: Copy .env.example to .env
      run: cp .env.example .env || echo ".env already exists"

    - name: Install Composer Dependencies
      run: composer install --no-dev --optimize-autoloader --no-progress --no-interaction --prefer-dist

    - name: Generate Application Key (for build)
      run: php artisan key:generate --force

    - name: Install Node.js
      uses: actions/setup-node@v4 # Update ke v4
      with:
        node-version: '22'
        cache: 'npm' # Enable npm caching

    - name: Install Node.js Dependencies
      run: npm ci

    - name: Build Assets
      run: npm run build
      env:
        NODE_ENV: production

    - name: Set up SSH key
      uses: webfactory/ssh-agent@v0.9.0 # Update ke versi terbaru
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add Remote Host to Known Hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Server
      run: |
        rsync -avz --delete \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='tests' \
          --exclude='storage/app' \
          --exclude='storage/framework/cache' \
          --exclude='storage/framework/sessions' \
          --exclude='storage/framework/views' \
          --exclude='storage/logs' \
          --exclude='.env' \
          --exclude='.env.example' \
          . ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/var/www/store.hexavara.com/

    - name: Run Post-Deployment Commands
      uses: appleboy/ssh-action@v1.0.3 # Update ke versi terbaru
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /var/www/store.hexavara.com

          # Create required directories if not exist
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          mkdir -p bootstrap/cache

          # Set proper permissions
          sudo chown -R www-data:www-data storage bootstrap/cache
          sudo chmod -R 775 storage bootstrap/cache

          # Clear caches
          php artisan optimize:clear

          # Run migrations with backup check
          php artisan migrate --force

          # Create storage link if not exists
          [ ! -L public/storage ] && php artisan storage:link || echo "Storage link exists"

          # Optimize application
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache # Cache events juga

          # Restart services
          sudo systemctl reload php8.2-fpm || true
          sudo systemctl reload nginx || sudo systemctl reload apache2 || true
